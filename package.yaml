name:                file-proxy
version:             1.0.0.0
github:              "Lupino/file-proxy"
license:             BSD3
author:              "Lupino"
maintainer:          "lmjubuntu@gmail.com"
copyright:           "MIT"

extra-source-files:
- README.md
- ChangeLog.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/Lupino/file-proxy#readme>

dependencies:
- base >= 4.7 && < 5

library:
  source-dirs: src
  exposed-modules:
  - FileProxy.Client
  - FileProxy.Worker
  dependencies:
  - aeson
  - base16-bytestring
  - periodic-client
  - periodic-common
  - filepath
  - bytestring
  - cryptohash-sha256
  - unliftio
  - optparse-applicative
  - directory
  - time
  - metro
  - metro-socket
  - metro-transport-crypto

executables:
  file-proxy:
    main:                file-proxy-worker.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - file-proxy
  file-proxy-client:
    main:                file-proxy-client.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - file-proxy

tests:
  file-proxy-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - file-proxy
    - aeson
    - bytestring
    - directory
    - filepath
    - hspec
    - temporary
    - text
